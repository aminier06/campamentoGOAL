<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Sedes - Campamento GOAL</title>

<style>

/* 🎨 PALETA */
:root{
  --color-primario:#0d6efd;
  --color-secundario:#198754;
  --color-fondo:#eef3f8;
  --color-card:#ffffff;
  --color-borde:#d9e2ec;
  --color-texto:#1f2937;
}

/* BASE */
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--color-fondo);
  margin:0;
  padding:20px;
  color:var(--color-texto);
}

/* CONTENEDOR */
.container{
  max-width:1000px;
  margin:auto;
  background:var(--color-card);
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  overflow:hidden;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--color-primario),#3b82f6);
  color:white;
  padding:25px;
  text-align:center;
}

.header h1{margin:0;font-size:26px;}
.header h2{margin:5px 0 0;font-weight:normal;font-size:16px;}

/* FORM */
.form-body{
  padding:25px;
}

/* SECCIONES */
.seccion{
  border-left:5px solid var(--color-primario);
  background:#f9fbfd;
  padding:18px;
  margin-top:20px;
  border-radius:8px;
}

.seccion h3{
  margin-top:0;
  color:var(--color-primario);
}

/* CAMPOS */
label{
  font-weight:600;
  margin-top:12px;
  display:block;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid var(--color-borde);
  font-size:14px;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--color-primario);
  box-shadow:0 0 0 2px rgba(13,110,253,0.15);
}

/* FACILITADORES */
.facilitador{
  background:white;
  border:1px solid var(--color-borde);
  padding:12px;
  margin-top:12px;
  border-radius:6px;
}

/* BOTONES */
button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

.btn-agregar{background:var(--color-primario);color:white;}
.btn-eliminar{background:#dc3545;color:white;}
.btn-secundaria{background:#6c757d;color:white;}

.btn-enviar{
  background:var(--color-secundario);
  color:white;
  width:100%;
  font-size:16px;
  padding:14px;
  margin-top:20px;
}

.btn-enviar:hover{
  opacity:0.9;
}

/* MENSAJES */
.mensaje{
  margin-top:15px;
  padding:10px;
  border-radius:6px;
  display:none;
}

.mensaje.ok{
  display:block;
  background:#d1e7dd;
}

.mensaje.error{
  display:block;
  background:#f8d7da;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:15px;
  font-size:13px;
  background:#f1f5f9;
  margin-top:20px;
}

.oculto{display:none;}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Campamento GOAL</h1>
  <h2>Registro de sedes, coordinadores y facilitadores</h2>
</div>

<div class="form-body">

<form id="formulario">

<div class="seccion">
<h3>Datos generales</h3>

<label>Regional</label>
<select id="regional"></select>

<label>Distrito</label>
<select id="distrito"></select>

<label>Responsable</label>
<input id="responsable">

<label>Teléfono</label>
<input id="telefono">

<label>Correo</label>
<input id="correo">
</div>

<div class="seccion">
<h3>Sede principal</h3>

<input id="sede1Centro" placeholder="Centro sede">
<input id="sede1Estudiantes" placeholder="Estudiantes">
<input id="sede1Grupos" placeholder="Grupos">

<input id="sede1CoordNombre" placeholder="Coordinador">
<input id="sede1CoordCedula" placeholder="Cédula">
<input id="sede1CoordTelefono" placeholder="Teléfono">

<div id="facilitadores_sede1"></div>
<button type="button" class="btn-agregar" onclick="agregarFacilitador(1)">+ Facilitador</button>
</div>

<button type="button" class="btn-secundaria" onclick="mostrarSedeAdicional()">+ Sede adicional</button>

<div id="sedeAdicional" class="seccion oculto">
<h3>Sede adicional</h3>

<input id="sede2Centro">
<input id="sede2Estudiantes">
<input id="sede2Grupos">

<input id="sede2CoordNombre">
<input id="sede2CoordCedula">
<input id="sede2CoordTelefono">

<div id="facilitadores_sede2"></div>
<button type="button" class="btn-agregar" onclick="agregarFacilitador(2)">+ Facilitador</button>
</div>

<button type="submit" class="btn-enviar">Enviar información</button>

<div id="mensaje" class="mensaje"></div>

</form>

</div>

<div class="footer">
© <span id="year"></span> Aneudy Minier | Campamento GOAL
</div>

</div>

<script>
document.getElementById("year").textContent=new Date().getFullYear();
</script>

</body>
</html>
